<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodTrip Map</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=9ac4c5f3-c6fb-4988-a311-57d0c53ab4f0&lang=ru_RU" type="text/javascript"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .topbar {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 1000;
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 8px 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .topbar button {
            border: none;
            background: #d9534f;
            color: white;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <span id="userInfo">Загрузка...</span>
        <button id="logoutBtn" type="button">Выйти</button>
    </div>
    <div id="map"></div>

    <script>
        ymaps.ready(init);

        async function init() {
            const meResponse = await fetch("/api/me");
            if (!meResponse.ok) {
                window.location.href = "/login.html";
                return;
            }

            const meResult = await meResponse.json();
            document.getElementById("userInfo").textContent = `Пользователь: ${meResult.user.username}`;

            const myMap = new ymaps.Map("map", {
                center: [56.8389, 60.6057],
                zoom: 5
            });

            try {
                const response = await fetch("/api/sights/search?query=музей");
                if (response.status === 401) {
                    window.location.href = "/login.html";
                    return;
                }

                const result = await response.json();
                if (!result.success || !result.data) {
                    return;
                }

                result.data.forEach((place) => {
                    const placemark = new ymaps.Placemark(
                        [place.coordinates.lat, place.coordinates.lng],
                        {
                            balloonContentHeader: `<b>${place.name}</b>`,
                            balloonContentBody: `<p>${place.description}</p><p>Рейтинг: ${place.rating}</p>`,
                            balloonContentFooter: place.address,
                            hintContent: place.category
                        },
                        { preset: "islands#blueIcon" }
                    );

                    myMap.geoObjects.add(placemark);
                });
            } catch (error) {
                console.error("Ошибка при получении данных с бэкенда GoodTrip:", error);
            }
        }

        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await fetch("/api/logout", { method: "POST" });
            window.location.href = "/login.html";
        });
    </script>
</body>
</html>
