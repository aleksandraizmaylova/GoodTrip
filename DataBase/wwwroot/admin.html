<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoodTrip Admin</title>
    <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<main class="container">
    <h1>Админ-панель GoodTrip</h1>
    <p class="hint">Управление категориями и достопримечательностями</p>

    <section class="panel">
        <h2>Добавить достопримечательность</h2>
        <form id="attraction-form" class="form">
            <label>
                Название *
                <input type="text" id="name" required maxlength="200" />
            </label>

            <label>
                Короткое описание
                <textarea id="shortDescription" rows="3"></textarea>
            </label>

            <label>
                Полное описание
                <textarea id="fullDescription" rows="5"></textarea>
            </label>

            <label>
                Категория
                <select id="categoryId">
                    <option value="">Без категории</option>
                </select>
            </label>

            <label>
                Широта *
                <input type="text" id="latitude" required inputmode="decimal" placeholder="56.8380 или 56,8380" />
            </label>
            <label>
                Долгота *
                <input type="text" id="longitude" required inputmode="decimal" placeholder="60.6050 или 60,6050" />
            </label>
            <label>
                Адрес
                <input type="text" id="address" maxlength="500" />
            </label>
            <label>
                Город
                <input type="text" id="city" maxlength="100" />
            </label>
            <label>
                Ссылки на изображения (через запятую)
                <textarea id="imageUrls" rows="3" placeholder="https://... , https://..."></textarea>
            </label>
            <button type="submit">Сохранить</button>
        </form>
        <p id="result" class="result"></p>
    </section>

    <section class="panel">
        <div class="section-head">
            <h2>Категории</h2>
            <div class="section-tools">
                <button id="toggle-categories" type="button">Свернуть</button>
                <button id="reload-categories" type="button">Обновить</button>
            </div>
        </div>
        <div id="categories-content">
            <input type="text" id="categorySearch" placeholder="Поиск по названию категории..." />
            <form id="category-form" class="row-form">
                <input type="text" id="categoryName" placeholder="Название категории" maxlength="100" required />
                <input type="text" id="categoryIconUrl" placeholder="Иконка URL (необязательно)" />
                <input type="text" id="categoryColor" placeholder="#1E88E5" maxlength="7" />
                <button type="submit">Добавить</button>
            </form>
            <div id="categories-list" class="list"></div>
        </div>
    </section>

    <section class="panel">
        <div class="section-head">
            <h2>Достопримечательности</h2>
            <div class="section-tools">
                <button id="toggle-attractions" type="button">Свернуть</button>
                <button id="reload-attractions" type="button">Обновить</button>
            </div>
        </div>
        <div id="attractions-content">
            <input type="text" id="attractionSearch" placeholder="Поиск по названию достопримечательности..." />
            <div id="attractions-list" class="list"></div>
        </div>
    </section>
</main>

<script src="js/admin.js"></script>
</body>
</html>
