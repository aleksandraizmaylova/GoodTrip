services:
  db:
    image: postgres:16-alpine
    container_name: goodtrip-db
    environment:
      POSTGRES_DB: tourism_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # SECURITY/SAFETY: do not expose Postgres publicly on hosting.
    # If you need local access for debugging, use:
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tourism_app"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: el111/goodtrip-api:latest
    container_name: goodtrip-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=tourism_app;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data: