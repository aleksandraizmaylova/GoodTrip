<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GoodTrip Map</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=9ac4c5f3-c6fb-4988-a311-57d0c53ab4f0&lang=ru_RU" type="text/javascript"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; }
        /* размеры контейнер для карты   */
        #map { width: 100%; height: 100vh; } 
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // 2. Ждем загрузки API Яндекса
        ymaps.ready(init);

        async function init() {
            // 3. Создаем саму карту, центрируем на екб
            var myMap = new ymaps.Map("map", {
                center: [56.8389, 60.6057],
                zoom: 13
            });

            try {
                // 4. Запрашиваем данные с бэкенда
                // Передаем параметр query=музей, как ожидает контроллер
                const response = await fetch('http://localhost:3000/api/sights/search?query=музей');
                const result = await response.json();

                // 5. Если бэкенд вернул success: true, ставим метки
                if (result.success && result.data) {
                    result.data.forEach(place => {
                        // бэкенд отдает структуру: place.coordinates.lat и place.coordinates.lng
                        var placemark = new ymaps.Placemark(
                            [place.coordinates.lat, place.coordinates.lng], {
                                // Данные для всплывающего окна при клике
                                balloonContentHeader: `<b>${place.name}</b>`,
                                balloonContentBody: `<p>${place.description}</p>`,
                                balloonContentFooter: place.address,
                                hintContent: place.category
                            }, {
                                preset: 'islands#blueIcon'
                            }
                        );
                        myMap.geoObjects.add(placemark);
                    });
                }
            } catch (error) {
                console.error('Ошибка при получении данных с бэкенда GoodTrip:', error);
            }
        }
    </script>
</body>
</html>
